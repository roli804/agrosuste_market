<!DOCTYPE html>

<head>

    <!-- Favicon Oficial Agro-Suste (Folha Arco) -->

        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M50 85C50 85 32 78 20 60C8 42 10 25 10 25C10 25 28 22 42 35C56 48 60 65 60 65' stroke='%231B5E20' stroke-width='7' stroke-linecap='round' fill='none'/%3E%3Cpath d='M48 28C48 28 65 15 85 18C105 21 95 45 95 45' stroke='%231B5E20' stroke-width='7' stroke-linecap='round' fill='none'/%3E%3Cpath d='M68 45C68 45 78 35 88 38C98 41 90 60 90 60C90 60 75 75 55 85' stroke='%231B5E20' stroke-width='7' stroke-linecap='round' fill='none'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        display: ['Poppins', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            DEFAULT: '#2E7D32',
                            light: '#4CAF50',
                            soft: '#A5D6A7'
                        },
                        accent: '#D4A373',
                        earth: {
                            DEFAULT: '#8D6E63',
                            light: '#F5F5DC',
                            sand: '#EFEFE8'
                        },
                        neutral: {
                            light: '#E0E0E0',
                            medium: '#757575',
                            dark: '#263238'
                        }
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-verde-folha: #2E7D32;
            --primary-verde-broto: #4CAF50;
            --bg-light: #F5F5DC;
            --bg-card: #FFFFFF;
            --text-main: #263238;
            --border-light: #E0E0E0;
        }

        h1, h2, h3, h4, h5, h6 { font-family: 'Poppins', sans-serif; color: var(--text-main); }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            margin: 0; padding: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Shadow-left premium effect */
        .shadow-left-premium {
            box-shadow: -10px 0px 30px rgba(0, 0, 0, 0.05);
        }

        /* Scrollbar hiding utilities */
        .hidden-scroll::-webkit-scrollbar { width: 0; background: transparent; }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            display: flex;
            width: max-content;
            animation: marquee 40s linear infinite;
        }
        .animate-marquee:hover {
            animation-play-state: paused;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
