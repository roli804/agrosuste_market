<!DOCTYPE html>
<html lang="pt-MZ">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro-Suste Market - Marketplace de Moçambique</title>
    <!-- Favicon Oficial Agro-Suste (Folha Arco) -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M50 85C50 85 32 78 20 60C8 42 10 25 10 25C10 25 28 22 42 35C56 48 60 65 60 65' stroke='%231B5E20' stroke-width='7' stroke-linecap='round' fill='none'/%3E%3Cpath d='M48 28C48 28 65 15 85 18C105 21 95 45 95 45' stroke='%231B5E20' stroke-width='7' stroke-linecap='round' fill='none'/%3E%3Cpath d='M68 45C68 45 78 35 88 38C98 41 90 60 90 60C90 60 75 75 55 85' stroke='%231B5E20' stroke-width='7' stroke-linecap='round' fill='none'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        display: ['Poppins', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            DEFAULT: '#2E7D32',
                            light: '#4CAF50',
                            soft: '#A5D6A7'
                        },
                        accent: '#D4A373',
                        earth: {
                            DEFAULT: '#8D6E63',
                            light: '#F5F5DC',
                            sand: '#EFEFE8'
                        },
                        neutral: {
                            light: '#E0E0E0',
                            medium: '#757575',
                            dark: '#263238'
                        }
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-verde-folha: #2E7D32;
            --primary-verde-broto: #4CAF50;
            --bg-light: #F5F5DC;
            --bg-card: #FFFFFF;
            --text-main: #263238;
            --border-light: #E0E0E0;
        }

        h1, h2, h3, h4, h5, h6 { font-family: 'Poppins', sans-serif; color: var(--text-main); }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            margin: 0; padding: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Shadow-left premium effect */
        .shadow-left-premium {
            box-shadow: -10px 0px 30px rgba(0, 0, 0, 0.05);
        }

        /* Scrollbar hiding utilities */
        .hidden-scroll::-webkit-scrollbar { width: 0; background: transparent; }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            display: flex;
            width: max-content;
            animation: marquee 40s linear infinite;
        }
        .animate-marquee:hover {
            animation-play-state: paused;
        }

        /* --- PREMIUM SAAS DESIGN SYSTEM (Scoped via .theme-premium or specific classes) --- */
        .premium-card {
            background-color: #FFFFFF;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            border: 1px solid #F0F0F0;
        }

        .premium-btn {
            background-color: #1B5E20;
            color: #FFFFFF;
            border-radius: 10px;
            padding: 12px 24px;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(27, 94, 32, 0.2);
            outline: none;
            cursor: pointer;
        }
        .premium-btn:hover {
            background-color: #0D3B12;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(27, 94, 32, 0.3);
        }
        .premium-btn:active {
            transform: scale(0.97);
        }

        .premium-input {
            width: 100%;
            height: 48px;
            border-radius: 10px;
            background-color: #FAFAFA;
            border: 1px solid transparent;
            padding: 0 16px;
            font-size: 14px;
            font-weight: 600;
            color: #1C1C1C;
            transition: all 0.2s ease;
            outline: none;
        }
        .premium-input:focus {
            border: 1px solid #2E7D32;
            background-color: #FFFFFF;
            box-shadow: 0 0 0 3px rgba(46,125,50,0.08);
        }

        .premium-table th {
            text-align: left;
            padding: 16px;
            font-size: 11px;
            font-weight: 700;
            color: #6D6D6D;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background-color: #FAFAFA;
            border-bottom: 2px solid #E0E0E0;
        }
        .premium-table td {
            padding: 16px;
            border-bottom: 1px solid #F0F0F0;
            transition: background-color 0.2s;
        }
        .premium-table tbody tr:hover td {
            background-color: #F8FBF8;
        }

        /* Floating Label CSS Strategy */
        .premium-floating-label { position: relative; }
        .premium-floating-label label {
            position: absolute;
            left: 12px;
            top: -8px;
            background: white;
            padding: 0 4px;
            font-size: 10px;
            font-weight: 700;
            color: #A0A0A0;
            transition: all 0.2s ease;
            pointer-events: none;
        }

        /* Marketplace & Product Card Refinement */
        .shop-card {
            background: #FFFFFF;
            border: 1px solid #E0E0E0;
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .shop-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08);
            border-color: #2E7D32;
        }
        .shop-card-img-wrapper {
            position: relative;
            width: 100%;
            height: 180px;
            overflow: hidden;
        }
        .shop-card-img {
            width: 100%;
            height: 100%;
            object-cover: cover;
            transition: transform 0.6s ease;
        }
        .shop-card:hover .shop-card-img {
            transform: scale(1.1);
        }
        .sidebar-link {
            width: 100%;
            text-align: left;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            items-center: center;
            gap: 12px;
        }
        .sidebar-link.active {
            background-color: #2E7D32;
            color: #FFFFFF;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.2);
        }
        .sidebar-link:not(.active) {
            color: #6D6D6D;
        }
        .sidebar-link:not(.active):hover {
            background-color: #F5F5F0;
            color: #1C1C1C;
        }

        /* Enforce elegant fonts on theme-premium */
        .theme-premium {
            font-family: 'Inter', sans-serif;
            color: #1C1C1C;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
