version: '3.9'

services:

  # ── Frontend – Modo de Desenvolvimento (Node.js + Vite) ──────────────────
  frontend:
    image: node:20-alpine
    container_name: agrosuste-frontend-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules # evitar sobrescrever node_modules do host
    ports:
      - "3000:5173" # acede em http://localhost:3000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - NODE_ENV=development
    restart: unless-stopped

  # ── Frontend – Modo Produção (Nginx after build) ─────────────────────────
  frontend-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agrosuste-frontend-prod
    ports:
      - "8080:80" # acede em http://localhost:8080
    restart: unless-stopped
    profiles:
      - prod
